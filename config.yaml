data:
  db_path: data/gas_monitoring.db
  processed_path: data/processed_gas_monitoring.csv

training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

models:
  decision_tree:
    max_depth: 8
  random_forest:
    n_estimators: 100
    max_depth: 10
  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
