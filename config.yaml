# Data Paths
data:
  raw_path: "data/raw_data.csv"
  processed_path: "data/processed_data.csv"

# Training Parameters
training:
  test_size: 0.2
  random_state: 42
  cv_folds: 5

# Model Hyperparameters
# These are the base settings used in training.py 
# before the grid search optimization starts.
models:
  decision_tree:
    max_depth: 5
    min_samples_split: 2
  
  random_forest:
    n_estimators: 100
    max_depth: 10
  
  xgboost:
    n_estimators: 100
    learning_rate: 0.1
    max_depth: 5
  
  logistic_regression:
    solver: "liblinear"
    C: 1.0
    max_iter: 1000
